name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Lint
        run: cargo clippy --workspace --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Build wasm plugins
        run: |
          cargo build --release --features wasm --target wasm32-unknown-unknown -p lax-css
          cargo build --release --features wasm --target wasm32-unknown-unknown -p lax-sql
          cargo build --release --features wasm --target wasm32-unknown-unknown -p lax-markup
      - uses: actions/upload-artifact@v4
        with:
          name: plugins
          path: target/wasm32-unknown-unknown/release/lax_*.wasm
